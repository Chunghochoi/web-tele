<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Bot Crypto - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Lớp nền bong bóng trang trí -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="glass-panel">
        <div class="header">
            <h2>🤖 Bot Control Center</h2>
            <p class="status-text">Trạng thái: <span class="status-online">Đang kết nối</span></p>
        </div>

        <!-- Khu vực hiển thị thông số -->
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-icon">💰</span>
                <div class="stat-info">
                    <p>Số dư</p>
                    <h3 id="balance">0<small>đ</small></h3>
                </div>
            </div>
            <div class="stat-card">
                <span class="stat-icon">📊</span>
                <div class="stat-info">
                    <p>NV Hôm nay</p>
                    <h3 id="tasks">0/0</h3>
                </div>
            </div>
            <div class="stat-card">
                <span class="stat-icon">🏆</span>
                <div class="stat-info">
                    <p>Thứ hạng</p>
                    <h3 id="rank">Đang tải...</h3>
                </div>
            </div>
        </div>

        <!-- Khu vực Auto-PPlink -->
        <div class="auto-section glass-inner">
            <div class="auto-header">
                <div class="auto-title">
                    <span class="stat-icon">⚡</span>
                    <strong>Auto-PPlink</strong>
                </div>
                <!-- Nút gạt chuẩn iOS -->
                <label class="ios-switch">
                    <input type="checkbox" id="auto-pplink">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="auto-settings">
                <span>Thời gian Delay (giây):</span>
                <input type="number" id="delay-input" value="5" min="1" max="60">
            </div>
        </div>

        <!-- Bảng điều khiển nút bấm -->
        <div class="controls-grid">
            <button class="btn glass-btn" id="btn-up2">🚀 /uptolink2step</button>
            <button class="btn glass-btn" id="btn-up3">🚀 /uptolink3step</button>
            <button class="btn glass-btn" id="btn-view">👁️ /view</button>
            <button class="btn glass-btn" id="btn-top">🥇 /top</button>
            <button class="btn glass-btn" id="btn-spin">🎰 /spin</button>
            <button class="btn glass-btn btn-danger" id="btn-withdraw">💸 /withdraw</button>
        </div>
        
        <!-- Log hiển thị thiết bị (Tùy chọn) -->
        <div class="log-section">
            <p><strong>Hoạt động gần đây:</strong></p>
            <div id="activity-log" class="log-box">Hệ thống sẵn sàng...</div>
        </div>
    </div>

    <!-- Màn hình thông báo Tiền về (Ẩn mặc định) -->
    <div id="alert-overlay" class="overlay hidden">
        <div class="glass-alert">
            <div class="alert-icon">🎉</div>
            <h2>Tiền về, Tiền về!</h2>
            <p>Yêu cầu rút tiền của bạn đã được Admin duyệt.</p>
            <button class="btn btn-primary" id="btn-alert-ok">OK Tuyệt vời</button>
        </div>
    </div>

    <!-- Nạp thư viện Socket.io và Script xử lý -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
